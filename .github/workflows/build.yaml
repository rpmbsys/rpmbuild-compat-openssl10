name: RPM build
on: [push]
env:
  ARTIFACTORY_URL: https://rpmb.jfrog.io
  BINTRAY_USER: ${{ secrets.BINTRAY_USER }}
  BINTRAY_API_KEY: ${{ secrets.BINTRAY_API_KEY }}
  DOCKER_USER: ${{ secrets.DOCKER_USER }}
  DOCKER_PASS: ${{ secrets.DOCKER_PASS }}
  RL8: 8.10.20240528
  RL8TAG: 8.10.20240528
  RL9: 9.7.20251123
  RL9TAG: 9.7.20251123
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - compose-file: docker-compose.yml
            repo: custom
            build: rocky8build
            uploader: rocky8bintray
            repo_path: rocky/8
    env:
      BUILD_COMPOSE_FILE: ${{ matrix.compose-file }}
      BINTRAY_REPO: ${{ matrix.repo }}
      BUILD: ${{ matrix.build }}
      UPLOADER: ${{ matrix.uploader }}
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: true
      - run: docker compose -f $BUILD_COMPOSE_FILE build --no-cache $BUILD
      - run: docker compose -f $BUILD_COMPOSE_FILE up --exit-code-from $BUILD $BUILD
      - run: docker compose -f rpmbuild/docker-compose.yml pull $UPLOADER
      - run: docker compose -f rpmbuild/docker-compose.yml run --rm -e BINTRAY_USER=$BINTRAY_USER -e BINTRAY_API_KEY=$BINTRAY_API_KEY -e BINTRAY_REPO=$BINTRAY_REPO -e ARTIFACTORY_URL=$ARTIFACTORY_URL $UPLOADER